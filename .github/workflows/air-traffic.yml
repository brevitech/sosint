name: Air Traffic Tracker (OpenSky)

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 min — keeps Pages rebuilds under 10/hr cap
  workflow_dispatch:

concurrency:
  group: air-traffic
  cancel-in-progress: false

jobs:
  scrape-air-traffic:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Scrape OpenSky air traffic
        env:
          OPENSKY_USER: ${{ secrets.OPENSKY_USER }}
          OPENSKY_PASS: ${{ secrets.OPENSKY_PASS }}
        run: python scripts/scrape_air_traffic.py

      - name: Commit air-traffic.json
        run: |
          if [ ! -f air-traffic.json ]; then
            echo "No air-traffic.json produced."
            exit 0
          fi
          AIRCRAFT_COUNT=$(python3 -c "import json; print(json.load(open('air-traffic.json'))['aircraftCount'])" 2>/dev/null || echo "0")
          echo "Aircraft captured: $AIRCRAFT_COUNT"
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Stash → reset to latest main → re-apply (avoids index-dirty errors when
          # the hourly OSINT scraper has pushed a commit in parallel)
          mv air-traffic.json /tmp/air-traffic.json
          git fetch origin main
          git reset --hard origin/main
          mv /tmp/air-traffic.json air-traffic.json
          git add air-traffic.json
          if git diff --staged --quiet; then
            echo "No changes vs main."
            exit 0
          fi
          git commit -m "data: air-traffic snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ) ($AIRCRAFT_COUNT aircraft)"
          for i in 1 2 3 4; do
            if git push origin main; then exit 0; fi
            echo "push failed, retrying in $((i*2))s..."
            sleep $((i*2))
            git fetch origin main
            git rebase origin/main || git rebase --abort
          done
          echo "push failed after retries"
          exit 1
