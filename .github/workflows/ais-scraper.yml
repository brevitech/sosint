name: AIS Maritime Tracker (India Corridor)

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 min
  workflow_dispatch:

# Prevent overlapping runs (each listens 75s, but better safe)
concurrency:
  group: ais-scraper
  cancel-in-progress: false

jobs:
  scrape-ais:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Scrape AIS for Hormuz→India energy corridor
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: |
          if [ -z "$AISSTREAM_API_KEY" ]; then
            echo "AISSTREAM_API_KEY secret not set; skipping AIS scrape."
            exit 0
          fi
          python scripts/scrape_ais_india.py

      - name: Commit AIS snapshot
        run: |
          if [ ! -f ais-india.json ]; then
            echo "No ais-india.json produced; nothing to commit."
            exit 0
          fi
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ais-india.json
          if git diff --staged --quiet; then
            echo "No AIS changes."
          else
            # Rebase against latest main to minimize push conflicts with the
            # hourly OSINT scraper running in parallel
            git fetch origin main
            git pull --rebase origin main || true
            git commit -m "data: AIS snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)" --allow-empty=false || exit 0
            for i in 1 2 3 4; do
              if git push origin main; then exit 0; fi
              echo "push failed, retrying in $((i*2))s..."
              sleep $((i*2))
              git pull --rebase origin main || true
            done
            echo "push failed after retries"
            exit 1
          fi
