name: OSINT Scrapers

on:
  schedule:
    - cron: '0 * * * *'  # Every 1 hour
  workflow_dispatch:  # Manual trigger

jobs:
  run-scrapers:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run Sentiment Scraper (RSS + VADER)
        run: python scripts/scrape_sentiment.py

      - name: Run Incidents Scraper (GDELT GEO)
        run: python scripts/scrape_incidents.py

      - name: Run Military Assets Scraper (OSINT)
        run: python scripts/scrape_assets.py

      - name: Run Global Metrics Scraper (OSINT)
        env:
          FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: python scripts/scrape_global_metrics.py

      - name: Run Telegram Scraper (OSINT)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/scrape_telegram.py

      - name: Send Telegram Alerts (if thresholds met)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/send_telegram_alerts.py

      - name: Generate AI Alerts (Claude Opus 4.7, xhigh)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY secret not set; skipping AI alert generation."
            exit 0
          fi
          python scripts/generate_alerts.py

      - name: Commit updated OSINT data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add sentiment-data.json incidents-data.json military-assets.json global-metrics.json telegram-osint.json
          [ -f alerts.json ] && git add alerts.json || true
          if git diff --staged --quiet; then
            echo "No changes to OSINT data."
          else
            git commit -m "data: update OSINT feeds $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
            echo "OSINT data updated and pushed."
          fi
